<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>hinatabokkuri — Music Preview</title>
<style>
  :root {
    --bg: #0d0d0d;
    --bg2: #161616;
    --bg3: #1f1f1f;
    --text: #f0f0f0;
    --text-dim: #999;
    --border: #333;
    --amber: #ffa600;
    --pink: #ff5a8a;
    --cyan: #4fd1c5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1rem 1rem 180px 1rem;
    min-height: 100vh;
  }
  .container { max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { color: var(--text-dim); margin-bottom: 1.2rem; font-size: 0.85rem; }

  .hero {
    background: linear-gradient(135deg, #ffa600, #ff5a8a);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 10px 40px rgba(255,90,138,0.25);
  }
  .hero-icon { font-size: 2.5rem; }
  .hero-text { flex: 1; color: #000; }
  .hero-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 0.2rem; }
  .hero-sub { font-size: 0.8rem; opacity: 0.7; }
  .hero-btn {
    appearance: none; border: none;
    background: #000; color: #fff;
    padding: 0.8rem 1.4rem;
    border-radius: 999px;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: inherit;
  }

  .controls {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .chip {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text-dim);
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
  }
  .chip:hover { border-color: var(--amber); color: var(--text); }
  .chip.active { background: var(--amber); color: #000; border-color: var(--amber); }
  .view-toggle {
    margin-left: auto;
    display: flex;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .view-toggle button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 0.4rem 0.9rem;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
  }
  .view-toggle button.active { background: var(--amber); color: #000; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1rem;
  }
  .tile {
    background: var(--bg2);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .tile:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(255,166,0,0.25); }
  .tile.playing { outline: 2px solid var(--amber); }
  .tile-cover {
    aspect-ratio: 1 / 1;
    background: #000 center/cover no-repeat;
    position: relative;
  }
  .tile-cover::before {
    content: '▶'; position: absolute; inset: 0;
    display: grid; place-items: center; font-size: 3rem; color: #fff;
    background: rgba(0,0,0,0.45); opacity: 0; transition: opacity 0.2s;
  }
  .tile:hover .tile-cover::before { opacity: 1; }
  .tile.playing .tile-cover::before {
    content: '♪'; opacity: 1; background: rgba(255,166,0,0.3); color: var(--amber);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 50% { transform: scale(1.1); } }
  .tile-meta { padding: 0.7rem 0.8rem; }
  .tile-title {
    font-size: 0.85rem; font-weight: 700; line-height: 1.3;
    margin-bottom: 0.25rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tile-comment {
    font-size: 0.7rem; color: var(--text-dim); line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .genre-tag {
    display: inline-block; background: var(--pink); color: #fff;
    font-size: 0.6rem; padding: 0.1rem 0.4rem;
    border-radius: 4px; margin-bottom: 0.3rem; font-weight: 700;
  }

  .list { display: grid; gap: 0.8rem; }
  .list .tile { display: grid; grid-template-columns: 120px 1fr; align-items: stretch; }
  .list .tile-cover { width: 120px; aspect-ratio: 1/1; }
  .list .tile-title { font-size: 1rem; white-space: normal; }
  .list .tile-comment { font-size: 0.8rem; -webkit-line-clamp: 3; }

  /* Now Playing Bar */
  .now-playing {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(15,15,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 0.8rem 1rem calc(0.8rem + env(safe-area-inset-bottom)) 1rem;
    z-index: 100;
    display: none;
  }
  .now-playing.active { display: block; }
  .np-row {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 0.7rem;
    align-items: center;
  }
  .np-cover { width: 56px; height: 56px; border-radius: 6px; object-fit: cover; }
  .np-info { min-width: 0; cursor: pointer; }
  .np-title {
    font-weight: 700; font-size: 0.9rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .np-lyric {
    font-size: 0.75rem; color: var(--amber);
    height: 1.2rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .np-actions { display: flex; gap: 0.3rem; align-items: center; }
  .np-btn {
    appearance: none; border: none;
    background: transparent; color: var(--text);
    font-size: 1.3rem; cursor: pointer;
    width: 40px; height: 40px;
    border-radius: 50%;
    display: grid; place-items: center;
    padding: 0;
  }
  .np-btn:hover { background: var(--bg2); }
  .np-btn.primary { background: var(--amber); color: #000; font-size: 1.1rem; }
  .np-btn.active { color: var(--amber); }
  .np-progress {
    margin-top: 0.5rem;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    cursor: pointer;
    overflow: hidden;
  }
  .np-progress-fill {
    height: 100%; background: var(--amber);
    width: 0%;
  }

  .np-lyrics-full {
    margin-top: 1rem;
    padding: 1rem 0;
    max-height: 50vh;
    overflow-y: auto;
    text-align: left;
    scroll-behavior: smooth;
    display: none;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }
  .now-playing.expanded .np-lyrics-full { display: block; }
  .np-lyrics-full .lyric-line {
    padding: 0.4rem 1rem;
    color: var(--text-dim);
    font-size: 1rem;
    transition: color 0.3s, font-size 0.3s, font-weight 0.3s;
    word-break: break-word;
    overflow-wrap: anywhere;
    line-height: 1.5;
  }
  .np-lyrics-full .lyric-line.active {
    color: var(--amber);
    font-size: 1.2rem;
    font-weight: 700;
  }
  .np-lyrics-full .lyric-line.past { opacity: 0.35; }

  /* Update notification */
  .update-banner {
    position: fixed;
    top: 1rem; left: 50%;
    transform: translateX(-50%);
    background: var(--amber);
    color: #000;
    padding: 0.7rem 1rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 700;
    display: none;
    align-items: center;
    gap: 0.6rem;
    z-index: 200;
    box-shadow: 0 6px 20px rgba(255,166,0,0.4);
  }
  .update-banner.show { display: flex; }
  .update-banner button {
    appearance: none; border: none;
    background: #000; color: #fff;
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    font-weight: 700; font-size: 0.75rem;
    cursor: pointer; font-family: inherit;
  }
  .update-banner .dismiss {
    background: transparent; color: rgba(0,0,0,0.6);
    padding: 0.3rem 0.5rem;
  }

  /* Search */
  .search-box {
    position: relative;
    flex: 0 1 240px;
  }
  .search-box input {
    width: 100%;
    appearance: none;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    padding: 0.4rem 0.8rem 0.4rem 2rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-family: inherit;
  }
  .search-box input:focus { outline: 1px solid var(--amber); border-color: var(--amber); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 0.6rem; top: 50%;
    transform: translateY(-50%);
    font-size: 0.8rem;
    pointer-events: none;
  }

  /* Time display */
  .np-time {
    display: flex; justify-content: space-between;
    font-size: 0.7rem; color: var(--text-dim);
    margin-top: 0.3rem;
    font-variant-numeric: tabular-nums;
  }

  /* Clickable lyric */
  .np-lyrics-full .lyric-line { cursor: pointer; }
  .np-lyrics-full .lyric-line:hover { background: var(--bg2); border-radius: 4px; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 0.7rem; }
    .tile-title { font-size: 0.75rem; }
    .tile-comment { font-size: 0.65rem; }
    .list .tile { grid-template-columns: 80px 1fr; }
    .list .tile-cover { width: 80px; }
    .hero { flex-wrap: wrap; }
    .hero-text { width: 100%; }
    .search-box { flex: 1 1 100%; order: -1; }
  }
</style>
</head>

  { title: 'HANABI ☆ KISS',         file: 'hanabi_kiss.mp3',           cover: COVER('hanabi_kiss'),                         genre: 'dance',        comment: 'パラパラ全盛期への回帰' },
  { title: 'きみは幸せですか',       file: 'kimi_wa_shiawasedesuka.mp3', cover: COVER('kimihaima'),                          genre: 'ballad',       comment: 'まーちゃん、今君は幸せですか？' },
  { title: 'URIZUN',                 file: 'urizun.mp3',                 cover: COVER('urizun'),                             genre: 'jp-dance',     comment: 'Jersey Club × 琉球音階' },
  { title: '転生してもやっぱりしがないおっさんでした', file: 'hashiridase_ossan.mp3', cover: COVER('hashiridase_ossan'), genre: 'anime', comment: '自虐系アニメOP' },
];

SONGS.forEach(s => { s.lyrics = LRC_DB[s.file] || ''; });

function parseLRC(text) {
  if (!text) return [];
  return text.split('\n').map(line => {
    const m = line.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)$/);
    if (!m) return null;
    const t = parseInt(m[1]) * 60 + parseFloat(m[2]);
    const txt = m[3].trim();
    if (!txt || txt.startsWith('[')) return null;
    return { time: t, text: txt };
  }).filter(Boolean);
}

const grid = document.getElementById('songs');
const np = document.getElementById('nowPlaying');
const npCover = document.getElementById('npCover');
const npTitle = document.getElementById('npTitle');
const npLyricInline = document.getElementById('npLyricInline');
const npLyricsFull = document.getElementById('npLyricsFull');
const npProgress = document.getElementById('npProgress');
const npProgressFill = document.getElementById('npProgressFill');
const audio = document.getElementById('audio');
const btnShuffle = document.getElementById('btnShuffle');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const btnPlayPause = document.getElementById('btnPlayPause');
const btnExpand = document.getElementById('btnExpand');
const npInfoClick = document.getElementById('npInfoClick');

let currentFilter = 'all';
let currentView = 'grid';
let searchQuery = '';
let queue = [];
let currentIdx = -1;
let shuffleMode = false;
let parsedLyrics = [];

const fmtTime = s => {
  if (!isFinite(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
};

function render() {
  grid.innerHTML = '';
  grid.className = currentView;
  let filtered = currentFilter === 'all' ? SONGS : SONGS.filter(s => s.genre === currentFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(s =>
      s.title.toLowerCase().includes(q) ||
      s.comment.toLowerCase().includes(q) ||
      (s.lyrics || '').toLowerCase().includes(q)
    );
  }
  if (filtered.length === 0) {
    grid.innerHTML = '<p style="grid-column:1/-1;color:var(--text-dim);text-align:center;padding:2rem;">該当なし</p>';
    return;
  }
  filtered.forEach(s => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.file = s.file;
    tile.innerHTML = `
      <div class="tile-cover" style="background-image: url('${s.cover}')"></div>
      <div class="tile-meta">
        <span class="genre-tag">${s.genre}</span>
        <div class="tile-title">${s.title}</div>
        <div class="tile-comment">${s.comment}</div>
      </div>
    `;
    tile.addEventListener('click', () => {
      queue = [...filtered];
      currentIdx = filtered.indexOf(s);
      playCurrent();
    });
    grid.appendChild(tile);
  });
  markPlayingTile();
}

function markPlayingTile() {
  if (currentIdx < 0) return;
  const current = queue[currentIdx];
  if (!current) return;
  document.querySelectorAll('.tile').forEach(t => {
    t.classList.toggle('playing', t.dataset.file === current.file);
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function playCurrent() {
  if (currentIdx < 0 || currentIdx >= queue.length) return;
  const s = queue[currentIdx];
  npCover.src = s.cover;
  npTitle.textContent = s.title;
  audio.src = 'music/' + s.file;
  parsedLyrics = parseLRC(s.lyrics);
  renderFullLyrics();
  np.classList.add('active');
  audio.play().catch(e => console.log('play blocked', e));
  updateMediaSession(s);
  markPlayingTile();
}

function updateMediaSession(s) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: s.title,
    artist: 'hinatabokkuri',
    album: 'hinatabokkuri',
    artwork: [
      { src: s.cover, sizes: '512x512', type: 'image/jpeg' },
    ],
  });
  try {
    navigator.mediaSession.setActionHandler('play', () => audio.play());
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('previoustrack', playPrev);
    navigator.mediaSession.setActionHandler('nexttrack', playNext);
  } catch(e) {}
}

function playNext() {
  if (queue.length === 0) return;
  if (shuffleMode && currentIdx >= queue.length - 1) {
    queue = shuffle(SONGS);
    currentIdx = 0;
  } else {
    currentIdx = (currentIdx + 1) % queue.length;
  }
  playCurrent();
}
function playPrev() {
  if (queue.length === 0) return;
  currentIdx = (currentIdx - 1 + queue.length) % queue.length;
  playCurrent();
}

btnShuffle.addEventListener('click', () => {
  shuffleMode = !shuffleMode;
  btnShuffle.classList.toggle('active', shuffleMode);
});
btnPrev.addEventListener('click', playPrev);
btnNext.addEventListener('click', playNext);
btnPlayPause.addEventListener('click', () => {
  if (audio.paused) audio.play();
  else audio.pause();
});
audio.addEventListener('play', () => btnPlayPause.textContent = '⏸');
audio.addEventListener('pause', () => btnPlayPause.textContent = '▶');
audio.addEventListener('ended', playNext);
audio.addEventListener('timeupdate', () => {
  const pct = (audio.currentTime / audio.duration) * 100 || 0;
  npProgressFill.style.width = pct + '%';
  document.getElementById('npTimeCurrent').textContent = fmtTime(audio.currentTime);
  updateLyric(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('npTimeTotal').textContent = fmtTime(audio.duration);
});
npProgress.addEventListener('click', (e) => {
  const r = npProgress.getBoundingClientRect();
  const pct = (e.clientX - r.left) / r.width;
  audio.currentTime = audio.duration * pct;
});

document.getElementById('shuffleAll').addEventListener('click', () => {
  shuffleMode = true;
  btnShuffle.classList.add('active');
  queue = shuffle(SONGS);
  currentIdx = 0;
  playCurrent();
});

document.querySelectorAll('.chip[data-genre]').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-genre]').forEach(b => b.classList.remove('active'));
    c.classList.add('active');
    currentFilter = c.dataset.genre;
    render();
  });
});
document.querySelectorAll('[data-view]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('[data-view]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentView = b.dataset.view;
    render();
  });
});

function toggleExpand() { np.classList.toggle('expanded'); }
btnExpand.addEventListener('click', toggleExpand);
npInfoClick.addEventListener('click', toggleExpand);

function renderFullLyrics() {
  if (parsedLyrics.length === 0) {
    npLyricsFull.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:2rem;">歌詞データ未登録（プレビュー版は最新3曲のみ対応）</p>';
    return;
  }
  npLyricsFull.innerHTML = parsedLyrics.map((l, i) =>
    `<div class="lyric-line" data-idx="${i}" data-time="${l.time}">${l.text}</div>`
  ).join('');
  npLyricsFull.querySelectorAll('.lyric-line').forEach(el => {
    el.addEventListener('click', () => {
      const t = parseFloat(el.dataset.time);
      if (!isNaN(t)) {
        audio.currentTime = t;
        if (audio.paused) audio.play();
      }
    });
  });
}

function updateLyric(t) {
  if (parsedLyrics.length === 0) { npLyricInline.textContent = ''; return; }
  let activeIdx = -1;
  for (let i = parsedLyrics.length - 1; i >= 0; i--) {
    if (t >= parsedLyrics[i].time) { activeIdx = i; break; }
  }
  npLyricInline.textContent = activeIdx >= 0 ? parsedLyrics[activeIdx].text : '';
  const lines = npLyricsFull.querySelectorAll('.lyric-line');
  lines.forEach((el, i) => {
    el.classList.toggle('active', i === activeIdx);
    el.classList.toggle('past', i < activeIdx);
  });
  if (activeIdx >= 0 && np.classList.contains('expanded')) {
    const active = lines[activeIdx];
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// Search input
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  render();
});

// Share to X
document.getElementById('btnShare').addEventListener('click', () => {
  if (currentIdx < 0) return;
  const s = queue[currentIdx];
  const text = `いま聴いてる: ${s.title} by hinatabokkuri`;
  const url = 'https://hinatabokkuri-star.github.io/';
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank', 'noopener');
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Skip if focused on input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (currentIdx < 0) return;
  switch (e.code) {
    case 'Space':
      e.preventDefault();
      if (audio.paused) audio.play(); else audio.pause();
      break;
    case 'ArrowRight':
      if (e.shiftKey) playNext();
      else audio.currentTime = Math.min(audio.duration, audio.currentTime + 15);
      break;
    case 'ArrowLeft':
      if (e.shiftKey) playPrev();
      else audio.currentTime = Math.max(0, audio.currentTime - 15);
      break;
    case 'KeyS':
      shuffleMode = !shuffleMode;
      btnShuffle.classList.toggle('active', shuffleMode);
      break;
  }
});

render();

// ── Service Worker update: notification-based (not forced reload) ──
const updateBanner = document.getElementById('updateBanner');
const updateNow = document.getElementById('updateNow');
const updateLater = document.getElementById('updateLater');
const DISMISS_KEY = 'hb_dismissed_version';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    setInterval(() => reg.update().catch(() => {}), 30000);
  }).catch(() => {});
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'RELOAD') {
      const version = e.data?.version || Date.now();
      const dismissed = localStorage.getItem(DISMISS_KEY);
      if (dismissed === String(version)) return;
      // If audio not actively playing, reload silently
      if (!audio || audio.paused) {
        location.reload();
        return;
      }
      // Otherwise show notification banner
      updateBanner.classList.add('show');
      updateNow.onclick = () => {
        localStorage.removeItem(DISMISS_KEY);
        location.reload();
      };
      updateLater.onclick = () => {
        localStorage.setItem(DISMISS_KEY, String(version));
        updateBanner.classList.remove('show');
      };
    }
  });
}
</script>
